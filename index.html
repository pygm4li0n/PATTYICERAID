<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>❄️ GLACIER REALMS · Ice & Transparency</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Fredoka One', 'Segoe UI', cursive, sans-serif;
            overflow: hidden;
            background: #030b18;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* ── EPIC DEEP BLUE BACKGROUND ── */
        .bg-glacier {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(circle at 30% 20%, rgba(5, 41, 162, 0.25) 0%, transparent 35%),
                radial-gradient(circle at 70% 60%, rgba(5, 41, 162, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(0, 100, 200, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #0529a2 0%, #02104a 60%, #010520 100%);
            animation: gentleShift 12s ease-in-out infinite alternate;
        }

        @keyframes gentleShift {
            0% {
                opacity: 0.95;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.04);
            }
        }

        /* ── OPTIMIZED SNOWFALL (falling straight, no drift) ── */
        #snowCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── SCREENS ── */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }
        .active {
            display: flex;
        }

        /* ── INTRO ── */
        #introScreen {
            background: transparent;
        }
        .intro-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .intro-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(5, 41, 162, 0.3));
            margin-bottom: 30px;
            border-radius: 20px;
        }
        .intro-loading-wrap {
            width: 80%;
            max-width: 350px;
        }
        .intro-loading-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(5, 41, 162, 0.3);
        }
        .intro-loading-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00e5ff, #80f0ff);
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6);
            transition: width 0.1s linear;
        }
        .intro-loading-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8px;
            text-align: center;
            font-weight: 600;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ── GAME WRAPPER ── */
        .game-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 560px;
            padding: 8px 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* ── LOGO (matches grid width) ── */
        .game-logo {
            width: 100%;
            max-width: 520px;
            height: auto;
            filter: drop-shadow(0 0 50px rgba(0, 229, 255, 0.3));
            margin: 0 auto;
        }

        /* ── INFO ROW (big emojis) ── */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 520px;
            padding: 0 4px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
        }
        .info-item {
            background: rgba(5, 41, 162, 0.2);
            backdrop-filter: blur(12px);
            padding: 6px 20px;
            border-radius: 30px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            font-family: 'Fredoka One', cursive;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .info-item .emoji-big {
            font-size: 1.4rem;
            filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.7));
        }
        .info-item .value {
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.1em;
        }

        /* ── GRID FRAME ── */
        .grid-frame {
            background: rgba(5, 41, 162, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid rgba(0, 229, 255, 0.12);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 80px rgba(0, 229, 255, 0.03);
            width: 100%;
            max-width: 520px;
            position: relative;
            overflow: hidden;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            position: relative;
        }

        /* ── CARDS ── */
        .card {
            aspect-ratio: 1 / 1;
            perspective: 800px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
            will-change: transform;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── CARD BACK (static teal snowflake, glassy) ── */
        .card-back {
            background: rgba(5, 41, 162, 0.15);
            border: 2px solid rgba(0, 229, 255, 0.25);
            box-shadow: inset 0 0 40px rgba(0, 229, 255, 0.08);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 2;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .card-back::after {
            content: '❄';
            font-size: 3.2rem;
            color: rgba(0, 229, 255, 0.95);
            text-shadow:
                0 0 25px rgba(0, 229, 255, 0.9),
                0 0 50px rgba(0, 229, 255, 0.5);
            /* static - no animation */
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.8));
            transform: scale(1);
            /* ensures straight orientation */
        }

        .card:hover .card-back {
            border-color: rgba(0, 229, 255, 0.6);
            box-shadow: inset 0 0 60px rgba(0, 229, 255, 0.15), 0 0 30px rgba(0, 229, 255, 0.3);
        }

        /* ── CARD FRONT (dark glass) ── */
        .card-front {
            background: rgba(5, 41, 162, 0.25);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(0, 229, 255, 0.3);
            transform: rotateY(180deg);
            font-size: 2.8rem;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
            box-shadow: inset 0 0 30px rgba(0, 229, 255, 0.1);
        }

        /* ── WIN GLOW ── */
        .card.glow .card-front {
            border-color: rgba(0, 229, 255, 0.8);
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.6), inset 0 0 40px rgba(0, 229, 255, 0.25);
        }

        /* ── WIN MESSAGE (colored by type) ── */
        .win-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            pointer-events: none;
            z-index: 30;
            opacity: 0;
            letter-spacing: 2px;
            white-space: nowrap;
            color: white;
            font-family: 'Fredoka One', cursive;
            text-shadow: 0 0 60px rgba(0,0,0,0.9);
        }
        .win-message.show {
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .win-message.red { color: #ff4d6d; text-shadow: 0 0 50px #ff4d6d, 0 0 100px rgba(255,77,109,0.8); }
        .win-message.teal { color: #00e5ff; text-shadow: 0 0 50px #00e5ff, 0 0 100px rgba(0,229,255,0.8); }
        .win-message.gold { color: #ffd700; text-shadow: 0 0 50px #ffd700, 0 0 100px rgba(255,215,0,0.8); }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-15deg);
                opacity: 0;
            }
            40% {
                transform: translate(-50%, -50%) scale(1.1) rotate(2deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* ── ROUND TRACKER (epic circles closer together) ── */
        .round-tracker {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 520px;
            padding: 0 6px;
            margin: 6px 0 0;
            gap: 2px;
        }

        .tracker-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.1);
            border: 2px solid rgba(0, 229, 255, 0.3);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .tracker-dot.active {
            background: rgba(0, 229, 255, 0.8);
            border-color: white;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.9);
            transform: scale(1.4);
        }
        .tracker-dot.neutral {
            background: rgba(0, 229, 255, 0.5);
            border-color: rgba(255,255,255,0.6);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.7);
            transform: scale(1.25);
        }
        .tracker-dot.current {
            border-color: rgba(0, 229, 255, 0.9);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.7);
            animation: dotPulse 1.2s infinite;
        }

        @keyframes dotPulse {
            0%,
            100% {
                transform: scale(1.4);
            }
            50% {
                transform: scale(1.8);
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .grid-frame {
                padding: 10px;
                border-radius: 24px;
            }
            .card-grid {
                gap: 8px;
            }
            .card-front {
                font-size: 2rem;
            }
            .card-back::after {
                font-size: 2.4rem;
            }
            .game-logo {
                max-width: 400px;
            }
            .info-item {
                font-size: 0.7rem;
                padding: 4px 12px;
            }
            .tracker-dot {
                width: 14px;
                height: 14px;
            }
            .win-message {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 400px) {
            .game-logo {
                max-width: 280px;
            }
            .card-front {
                font-size: 1.6rem;
            }
            .card-back::after {
                font-size: 1.8rem;
            }
            .tracker-dot {
                width: 10px;
                height: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glacier"></div>
    <canvas id="snowCanvas"></canvas>

    <!-- INTRO SCREEN -->
    <div id="introScreen" class="screen active">
        <div class="intro-container">
            <img class="intro-image" src="https://i.postimg.cc/cHrqvr3Q/Chat-GPT-Image-6-jul-2026-01-02-18-1.png" alt="Glacier Realms">
            <div class="intro-loading-wrap">
                <div class="intro-loading-track">
                    <div class="intro-loading-fill" id="introLoadingFill"></div>
                </div>
                <div class="intro-loading-text" id="introLoadingText">Loading ❄️ 0%</div>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <div class="game-wrapper">
            <img class="game-logo" src="https://i.postimg.cc/2jJMpVh7/Pattu-Horzontal.png" alt="Glacier Realms">

            <div class="info-row">
                <div class="info-item">
                    <span class="emoji-big">❄️</span>
                    <span class="value" id="roundDisplay">1 / 10</span>
                </div>
                <div class="info-item">
                    <span class="emoji-big">💎</span>
                    <span class="value" id="scoreDisplay">0</span>
                </div>
            </div>

            <div class="grid-frame">
                <div class="card-grid" id="cardGrid"></div>
                <div class="win-message" id="winMessage"></div>
            </div>

            <div class="round-tracker" id="roundTracker"></div>
        </div>
    </div>

    <script>
        (function() {
            // ═══════ SNOWFALL (straight fall, no wind) ═══════
            const snowCanvas = document.getElementById('snowCanvas');
            const snowCtx = snowCanvas.getContext('2d');
            let snowW, snowH;
            const snowflakes = [];
            const SNOW_COUNT = 70;

            function resizeSnow() {
                snowW = snowCanvas.width = window.innerWidth;
                snowH = snowCanvas.height = window.innerHeight;
            }

            function initSnow() {
                snowflakes.length = 0;
                for (let i = 0; i < SNOW_COUNT; i++) {
                    snowflakes.push({
                        x: Math.random() * snowW,
                        y: Math.random() * snowH,
                        r: Math.random() * 2.5 + 1,
                        speed: Math.random() * 1.2 + 0.4,
                        opacity: Math.random() * 0.35 + 0.15,
                    });
                }
            }

            function drawSnow() {
                snowCtx.clearRect(0, 0, snowW, snowH);
                for (const f of snowflakes) {
                    f.y += f.speed;
                    if (f.y > snowH + 10) {
                        f.y = -10;
                        f.x = Math.random() * snowW;
                    }
                    snowCtx.globalAlpha = f.opacity;
                    snowCtx.beginPath();
                    snowCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                    snowCtx.fillStyle = 'rgba(220, 245, 255, 0.9)';
                    snowCtx.fill();
                }
                requestAnimationFrame(drawSnow);
            }

            window.addEventListener('resize', () => { resizeSnow();
                initSnow(); });
            resizeSnow();
            initSnow();
            drawSnow();

            // ═══════ INTRO LOADING ═══════
            const introScreen = document.getElementById('introScreen');
            const gameScreen = document.getElementById('gameScreen');
            const introFill = document.getElementById('introLoadingFill');
            const introText = document.getElementById('introLoadingText');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 2 + 0.8;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        introScreen.classList.remove('active');
                        gameScreen.classList.add('active');
                        initGame();
                    }, 300);
                }
                introFill.style.width = progress + '%';
                introText.textContent = `Loading ❄️ ${Math.floor(progress)}%`;
            }, 80);

            // ═══════ GAME LOGIC ═══════
            const SYMBOLS = { gold: '💎', green: '❄️', red: '🔥' };
            const WIN_CLASSES = { gold: 'gold', green: 'teal', red: 'red' };
            const POINTS = { gold: 1250, green: 750, red: 450 };
            const TOTAL_ROUNDS = 10;

            let grid = [];
            let round = 1;
            let totalScore = 0;
            let roundActive = true;
            let gameOver = false;
            let roundResults = [];
            let revealedCount = {};
            let isProcessing = false;

            const cardGrid = document.getElementById('cardGrid');
            const roundDisplay = document.getElementById('roundDisplay');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const roundTracker = document.getElementById('roundTracker');
            const winMessage = document.getElementById('winMessage');

            function initGrid() {
                let types = [];
                for (let i = 0; i < 4; i++) types.push('gold', 'green', 'red');
                for (let i = types.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [types[i], types[j]] = [types[j], types[i]];
                }
                grid = types.map(type => ({ type, revealed: false }));
                revealedCount = { gold: 0, green: 0, red: 0 };
                roundActive = true;
                isProcessing = false;
            }

            function renderGrid() {
                cardGrid.innerHTML = '';
                grid.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.index = index;

                    const inner = document.createElement('div');
                    inner.className = 'card-inner';

                    const front = document.createElement('div');
                    front.className = 'card-front';
                    front.textContent = SYMBOLS[item.type];

                    const back = document.createElement('div');
                    back.className = 'card-back';

                    inner.appendChild(front);
                    inner.appendChild(back);
                    card.appendChild(inner);

                    if (item.revealed) card.classList.add('flipped');
                    card.addEventListener('click', () => handleCardClick(index));
                    cardGrid.appendChild(card);
                });
            }

            function handleCardClick(index) {
                if (gameOver || !roundActive || isProcessing) return;
                const item = grid[index];
                if (item.revealed) return;

                item.revealed = true;
                revealedCount[item.type]++;
                cardGrid.children[index].classList.add('flipped');

                if (revealedCount[item.type] === 3) {
                    isProcessing = true;
                    roundActive = false;
                    totalScore += POINTS[item.type];
                    updateHUD();

                    grid.forEach((g, i) => {
                        if (g.type === item.type && g.revealed) {
                            cardGrid.children[i].classList.add('glow');
                        }
                    });

                    winMessage.innerHTML = `${SYMBOLS[item.type]} +${POINTS[item.type]}`;
                    winMessage.className = `win-message show ${WIN_CLASSES[item.type]}`;
                    roundResults[round - 1] = item.type;

                    setTimeout(() => {
                        winMessage.classList.remove('show', 'red', 'teal', 'gold');
                        document.querySelectorAll('.card.glow').forEach(el => el.classList.remove('glow'));
                        nextRound();
                    }, 1500);
                } else if (grid.every(g => g.revealed)) {
                    isProcessing = true;
                    roundActive = false;
                    roundResults[round - 1] = null;
                    winMessage.textContent = '🌨️ No match';
                    winMessage.className = 'win-message show teal'; // neutral teal
                    setTimeout(() => {
                        winMessage.classList.remove('show', 'teal');
                        nextRound();
                    }, 1000);
                }
                updateHUD();
            }

            function nextRound() {
                round++;
                if (round > TOTAL_ROUNDS) {
                    endGame();
                    return;
                }
                initGrid();
                renderGrid();
                updateHUD();
                updateTracker();
                isProcessing = false;
            }

            function endGame() {
                gameOver = true;
                roundActive = false;
                winMessage.textContent = '❄️ COMPLETE ❄️';
                winMessage.className = 'win-message show gold';
                setTimeout(() => {
                    round = 1;
                    totalScore = 0;
                    gameOver = false;
                    roundResults = [];
                    initGrid();
                    renderGrid();
                    updateHUD();
                    updateTracker();
                    winMessage.classList.remove('show', 'gold');
                    winMessage.textContent = '';
                }, 2500);
            }

            function updateHUD() {
                roundDisplay.textContent = `${Math.min(round, TOTAL_ROUNDS)} / ${TOTAL_ROUNDS}`;
                scoreDisplay.textContent = totalScore;
            }

            function updateTracker() {
                roundTracker.innerHTML = '';
                for (let i = 0; i < TOTAL_ROUNDS; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'tracker-dot';
                    if (i < roundResults.length) {
                        dot.classList.add(roundResults[i] ? 'active' : 'neutral');
                    }
                    if (i === round - 1 && !gameOver) dot.classList.add('current');
                    roundTracker.appendChild(dot);
                }
            }

            function initGame() {
                initGrid();
                renderGrid();
                updateHUD();
                updateTracker();
            }

            // Reset with R key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'r' || e.key === 'R') {
                    round = 1;
                    totalScore = 0;
                    gameOver = false;
                    roundResults = [];
                    initGrid();
                    renderGrid();
                    updateHUD();
                    updateTracker();
                    winMessage.classList.remove('show', 'red', 'teal', 'gold');
                    winMessage.textContent = '';
                }
            });
        })();
    </script>
</body>
</html>
