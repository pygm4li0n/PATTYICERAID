<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>❄️ GLACIER REALMS · Ice & Transparency</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Fredoka One', 'Segoe UI', cursive, sans-serif;
            overflow: hidden;
            background: #040a12;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── BACKGROUND ─── */
        .bg-glacier {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(200, 240, 255, 0.06) 0%, transparent 35%),
                radial-gradient(ellipse at 30% 20%, #2a6a8a 0%, #0a2a4a 50%, #040a12 100%);
        }

        /* ─── LIGHT SNOW CANVAS (optimized) ─── */
        #snowCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── SCREENS ─── */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }
        .active {
            display: flex;
        }

        /* ─── INTRO ─── */
        #introScreen {
            background: transparent;
        }
        .intro-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .intro-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(100, 180, 240, 0.15));
            margin-bottom: 30px;
            border-radius: 20px;
        }
        .intro-loading-wrap {
            width: 80%;
            max-width: 350px;
        }
        .intro-loading-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(100, 180, 240, 0.15);
        }
        .intro-loading-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6ab0d6, #a0d0f0);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(100, 180, 240, 0.2);
            transition: width 0.1s linear;
        }
        .intro-loading-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 8px;
            text-align: center;
            font-weight: 600;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ─── GAME WRAPPER ─── */
        .game-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 600px;
            padding: 8px 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .game-logo {
            width: 100%;
            max-width: 420px;
            height: auto;
            filter: drop-shadow(0 0 40px rgba(100, 200, 255, 0.15));
            margin-bottom: 2px;
        }
        .game-subtitle {
            color: rgba(200, 235, 255, 0.3);
            font-size: 0.65rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-align: center;
            font-weight: 400;
            font-family: 'Segoe UI', sans-serif;
            margin-top: -4px;
        }

        /* ─── GRID FRAME ─── */
        .grid-frame {
            background: rgba(20, 60, 100, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid rgba(100, 200, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 520px;
            position: relative;
            overflow: hidden;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            position: relative;
        }

        /* ─── CARDS ─── */
        .card {
            aspect-ratio: 1 / 1;
            perspective: 800px;
            cursor: pointer;
            position: relative;
            will-change: transform;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
            will-change: transform;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ─── CARD BACK (dark ice) ─── */
        .card-back {
            background: linear-gradient(145deg, #0a2a4a, #051020);
            border: 2px solid rgba(100, 200, 255, 0.15);
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 2;
            transition: border-color 0.3s;
        }

        .card-back::after {
            content: '❄';
            font-size: 2.4rem;
            opacity: 0.12;
            color: white;
            text-shadow: 0 0 8px rgba(100, 200, 255, 0.2);
            animation: subtlePulse 4s ease-in-out infinite;
        }

        @keyframes subtlePulse {
            0%,
            100% {
                opacity: 0.08;
                transform: scale(1);
            }
            50% {
                opacity: 0.18;
                transform: scale(1.06);
            }
        }

        .card:hover .card-back {
            border-color: rgba(100, 200, 255, 0.35);
        }

        /* ─── CARD FRONT (emoji on dark) ─── */
        .card-front {
            background: linear-gradient(160deg, #0a1a2e, #030b18);
            border: 2px solid rgba(100, 200, 255, 0.2);
            transform: rotateY(180deg);
            font-size: 2.8rem;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 15px rgba(100, 200, 255, 0.4);
            box-shadow: inset 0 0 30px rgba(100, 200, 255, 0.06);
        }

        /* ─── WIN GLOW (simple) ─── */
        .card.glow .card-front {
            border-color: rgba(180, 230, 255, 0.6);
            box-shadow: 0 0 40px rgba(100, 200, 255, 0.5), inset 0 0 30px rgba(100, 200, 255, 0.1);
        }

        /* ─── WIN MESSAGE ─── */
        .win-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            pointer-events: none;
            z-index: 30;
            opacity: 0;
            text-shadow: 0 0 80px rgba(0, 0, 0, 0.8), 0 4px 30px rgba(0, 0, 0, 0.6);
            letter-spacing: 2px;
            white-space: nowrap;
            color: white;
            font-family: 'Fredoka One', cursive;
        }
        .win-message.show {
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-15deg);
                opacity: 0;
            }
            40% {
                transform: translate(-50%, -50%) scale(1.15) rotate(2deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* ─── HUD ─── */
        .hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 520px;
            padding: 2px 4px 0;
            flex-wrap: wrap;
            gap: 6px 10px;
        }

        .hud-left,
        .hud-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .hud-item {
            font-family: 'Fredoka One', cursive;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.75rem;
            background: rgba(20, 60, 100, 0.15);
            backdrop-filter: blur(15px);
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid rgba(100, 200, 255, 0.08);
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .hud-item .label {
            opacity: 0.35;
            font-size: 0.6em;
            margin-right: 4px;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 1px;
            color: rgba(200, 235, 255, 0.7);
        }
        .hud-item .value {
            font-weight: 700;
            font-size: 1em;
            background: linear-gradient(135deg, #fff, #80c0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ─── ROUND TRACKER ─── */
        .round-tracker {
            display: flex;
            gap: 3px;
            align-items: center;
            padding: 2px 10px;
            background: rgba(20, 60, 100, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(100, 200, 255, 0.05);
        }

        .tracker-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(100, 200, 255, 0.05);
            border: 1px solid rgba(100, 200, 255, 0.1);
            transition: all 0.3s ease;
        }

        .tracker-dot.active {
            background: rgba(100, 200, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 12px rgba(100, 200, 255, 0.4);
            transform: scale(1.2);
        }
        .tracker-dot.neutral {
            background: rgba(200, 235, 255, 0.2);
            border-color: rgba(100, 200, 255, 0.2);
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.15);
            transform: scale(1.2);
        }
        .tracker-dot.current {
            border-color: rgba(100, 200, 255, 0.6);
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.2);
            animation: dotPulse 1s infinite;
        }

        @keyframes dotPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.4);
            }
        }

        /* ─── BUTTONS ─── */
        .btn-wallet,
        .btn-records {
            font-family: 'Fredoka One', cursive;
            padding: 4px 16px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid rgba(100, 200, 255, 0.06);
            border-radius: 30px;
            cursor: pointer;
            background: rgba(20, 60, 100, 0.1);
            backdrop-filter: blur(15px);
            color: rgba(200, 235, 255, 0.4);
            transition: all 0.2s ease;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-wallet:hover,
        .btn-records:hover {
            background: rgba(100, 200, 255, 0.06);
            border-color: rgba(100, 200, 255, 0.15);
            color: white;
            transform: translateY(-1px);
        }

        .btn-wallet.connected {
            border-color: rgba(100, 200, 255, 0.2);
            color: #80c0ff;
        }

        /* ─── LEADERBOARD ─── */
        #leaderboardOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 4, 12, 0.6);
            backdrop-filter: blur(30px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #leaderboardOverlay.open {
            display: flex;
        }

        .lb-panel {
            background: linear-gradient(160deg, rgba(10, 30, 60, 0.9), rgba(4, 12, 24, 0.95));
            border: 1px solid rgba(100, 200, 255, 0.05);
            border-radius: 32px;
            padding: 28px 30px 30px;
            max-width: 400px;
            width: 100%;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .lb-panel h2 {
            text-align: center;
            font-size: 1.6rem;
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, #fff, #80c0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .lb-panel .close-btn {
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 1.5rem;
            cursor: pointer;
            color: rgba(100, 200, 255, 0.15);
            background: none;
            border: none;
            transition: 0.2s;
        }
        .lb-panel .close-btn:hover {
            color: #80c0ff;
            transform: rotate(90deg);
        }

        .lb-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .lb-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            color: rgba(200, 235, 255, 0.75);
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(100, 200, 255, 0.03);
            border-radius: 10px;
        }
        .lb-list li .medal {
            font-size: 1.4rem;
            min-width: 30px;
            text-align: center;
        }
        .lb-list li .name {
            flex: 1;
            font-family: 'Segoe UI', sans-serif;
        }
        .lb-list li .score {
            font-weight: 700;
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, #fff, #80c0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .lb-empty {
            color: rgba(100, 200, 255, 0.15);
            text-align: center;
            padding: 30px 0;
            font-style: italic;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 600px) {
            .grid-frame {
                padding: 10px;
                border-radius: 24px;
            }
            .card-grid {
                gap: 8px;
            }
            .card-front,
            .card-back {
                border-radius: 16px;
            }
            .game-logo {
                max-width: 300px;
            }
            .hud-item {
                font-size: 0.6rem;
                padding: 3px 10px;
            }
            .tracker-dot {
                width: 10px;
                height: 10px;
            }
            .win-message {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 400px) {
            .game-logo {
                max-width: 240px;
            }
            .card-front {
                font-size: 2rem;
            }
            .hud-item {
                font-size: 0.5rem;
                padding: 2px 8px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glacier"></div>
    <canvas id="snowCanvas"></canvas>

    <!-- INTRO SCREEN -->
    <div id="introScreen" class="screen active">
        <div class="intro-container">
            <img class="intro-image" src="https://i.postimg.cc/cHrqvr3Q/Chat-GPT-Image-6-jul-2026-01-02-18-1.png" alt="Glacier Realms">
            <div class="intro-loading-wrap">
                <div class="intro-loading-track">
                    <div class="intro-loading-fill" id="introLoadingFill"></div>
                </div>
                <div class="intro-loading-text" id="introLoadingText">Loading ❄️ 0%</div>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <div class="game-wrapper">
            <img class="game-logo" src="https://i.postimg.cc/2jJMpVh7/Pattu-Horzontal.png" alt="Glacier Realms">
            <div class="game-subtitle">match the frozen crystals</div>

            <div class="grid-frame">
                <div class="card-grid" id="cardGrid"></div>
                <div class="win-message" id="winMessage"></div>
            </div>

            <div class="hud">
                <div class="hud-left">
                    <div class="hud-item"><span class="label">❄️</span><span class="value" id="roundDisplay">1 / 10</span></div>
                    <div class="hud-item"><span class="label">💎</span><span class="value" id="scoreDisplay">0</span></div>
                    <div class="hud-item"><span class="label">🏆</span><span class="value" id="recordDisplay">0</span></div>
                </div>
                <div class="hud-right">
                    <div class="round-tracker" id="roundTracker"></div>
                    <button class="btn-wallet" id="walletBtn">🔗 CONNECT</button>
                    <button class="btn-records" id="recordsBtn">📊 TOP</button>
                </div>
            </div>
        </div>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboardOverlay">
        <div class="lb-panel">
            <button class="close-btn" id="lbCloseBtn">✕</button>
            <h2>🏆 TOP 20</h2>
            <ul class="lb-list" id="lbList"><li class="lb-empty">Loading scores…</li></ul>
        </div>
    </div>

    <script>
        (function() {
            // ═══════════════════ OPTIMIZED SNOW (80 flakes) ═══════════════════
            const snowCanvas = document.getElementById('snowCanvas');
            const snowCtx = snowCanvas.getContext('2d');
            let snowW, snowH;
            const snowflakes = [];
            const SNOW_COUNT = 80;

            function resizeSnow() {
                snowW = snowCanvas.width = window.innerWidth;
                snowH = snowCanvas.height = window.innerHeight;
            }

            function initSnow() {
                snowflakes.length = 0;
                for (let i = 0; i < SNOW_COUNT; i++) {
                    snowflakes.push({
                        x: Math.random() * snowW,
                        y: Math.random() * snowH,
                        r: Math.random() * 3 + 1,
                        speed: Math.random() * 1.2 + 0.4,
                        wind: (Math.random() - 0.5) * 0.3,
                        opacity: Math.random() * 0.4 + 0.2,
                    });
                }
            }

            function drawSnow() {
                snowCtx.clearRect(0, 0, snowW, snowH);
                for (const f of snowflakes) {
                    f.y += f.speed;
                    f.x += Math.sin(f.y * 0.01) * f.wind;
                    if (f.y > snowH + 10) {
                        f.y = -10;
                        f.x = Math.random() * snowW;
                    }
                    if (f.x < -10) f.x = snowW + 10;
                    if (f.x > snowW + 10) f.x = -10;
                    snowCtx.globalAlpha = f.opacity;
                    snowCtx.beginPath();
                    snowCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                    snowCtx.fillStyle = 'rgba(220,240,255,0.8)';
                    snowCtx.fill();
                }
                requestAnimationFrame(drawSnow);
            }

            window.addEventListener('resize', () => { resizeSnow();
                initSnow(); });
            resizeSnow();
            initSnow();
            drawSnow();

            // ═══════════════════ INTRO LOADING ═══════════════════
            const introScreen = document.getElementById('introScreen');
            const gameScreen = document.getElementById('gameScreen');
            const introFill = document.getElementById('introLoadingFill');
            const introText = document.getElementById('introLoadingText');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 2 + 1;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        introScreen.classList.remove('active');
                        gameScreen.classList.add('active');
                        initGame();
                    }, 300);
                }
                introFill.style.width = progress + '%';
                introText.textContent = `Loading ❄️ ${Math.floor(progress)}%`;
            }, 80);

            // ═══════════════════ GAME LOGIC (4 of each type, match 3) ═══════════════════
            const SYMBOLS = { gold: '💎', green: '❄️', red: '🔥' };
            const TYPES = ['gold', 'green', 'red'];
            const POINTS = { gold: 1250, green: 750, red: 450 };
            const TOTAL_ROUNDS = 10;

            const DREAMLO_KEY = '6a4b0f1a8f40bc13186c5f87';
            const ALLORIGINS = 'https://api.allorigins.win/get?url=';

            let grid = [];
            let round = 1;
            let totalScore = 0;
            let recordScore = parseInt(localStorage.getItem('recordScore')) || 0;
            let roundActive = true;
            let gameOver = false;
            let roundResults = [];
            let revealedCount = {};
            let isProcessing = false;

            const cardGrid = document.getElementById('cardGrid');
            const roundDisplay = document.getElementById('roundDisplay');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const recordDisplay = document.getElementById('recordDisplay');
            const roundTracker = document.getElementById('roundTracker');
            const winMessage = document.getElementById('winMessage');
            const lbOverlay = document.getElementById('leaderboardOverlay');
            const lbList = document.getElementById('lbList');
            const walletBtn = document.getElementById('walletBtn');

            function initGrid() {
                let types = [];
                for (let i = 0; i < 4; i++) types.push('gold', 'green', 'red');
                // shuffle
                for (let i = types.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [types[i], types[j]] = [types[j], types[i]];
                }
                grid = types.map(type => ({ type, revealed: false }));
                revealedCount = { gold: 0, green: 0, red: 0 };
                roundActive = true;
                isProcessing = false;
            }

            function renderGrid() {
                cardGrid.innerHTML = '';
                grid.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.index = index;

                    const inner = document.createElement('div');
                    inner.className = 'card-inner';

                    const front = document.createElement('div');
                    front.className = 'card-front';
                    front.textContent = SYMBOLS[item.type];

                    const back = document.createElement('div');
                    back.className = 'card-back';

                    inner.appendChild(front);
                    inner.appendChild(back);
                    card.appendChild(inner);

                    if (item.revealed) card.classList.add('flipped');
                    card.addEventListener('click', () => handleCardClick(index));
                    cardGrid.appendChild(card);
                });
            }

            function handleCardClick(index) {
                if (gameOver || !roundActive || isProcessing) return;
                const item = grid[index];
                if (item.revealed) return;

                item.revealed = true;
                revealedCount[item.type]++;

                const cardEl = cardGrid.children[index];
                cardEl.classList.add('flipped');

                // check win
                if (revealedCount[item.type] === 3) {
                    isProcessing = true;
                    roundActive = false;
                    totalScore += POINTS[item.type];
                    if (totalScore > recordScore) {
                        recordScore = totalScore;
                        localStorage.setItem('recordScore', recordScore);
                    }
                    updateHUD();

                    // glow all matching
                    grid.forEach((g, i) => {
                        if (g.type === item.type && g.revealed) {
                            cardGrid.children[i].classList.add('glow');
                        }
                    });

                    winMessage.innerHTML = `${SYMBOLS[item.type]} +${POINTS[item.type]}`;
                    winMessage.className = 'win-message show';
                    roundResults[round - 1] = item.type;

                    setTimeout(() => {
                        winMessage.classList.remove('show');
                        document.querySelectorAll('.card.glow').forEach(el => el.classList.remove(
                            'glow'));
                        nextRound();
                    }, 1500);
                } else if (grid.every(g => g.revealed)) {
                    isProcessing = true;
                    roundActive = false;
                    roundResults[round - 1] = null;
                    winMessage.textContent = '🌨️ No match';
                    winMessage.className = 'win-message show';
                    setTimeout(() => {
                        winMessage.classList.remove('show');
                        nextRound();
                    }, 1000);
                }
                updateHUD();
            }

            function nextRound() {
                round++;
                if (round > TOTAL_ROUNDS) {
                    endGame();
                    return;
                }
                initGrid();
                renderGrid();
                updateHUD();
                updateTracker();
                isProcessing = false;
            }

            function endGame() {
                gameOver = true;
                roundActive = false;
                winMessage.textContent = '❄️ GLACIER COMPLETE ❄️';
                winMessage.className = 'win-message show';
                if (totalScore > 0) {
                    const name = prompt('🏆 Enter your name:', 'Player');
                    if (name && name.trim()) addScore(name.trim(), totalScore);
                }
                setTimeout(() => {
                    round = 1;
                    totalScore = 0;
                    gameOver = false;
                    roundResults = [];
                    initGrid();
                    renderGrid();
                    updateHUD();
                    updateTracker();
                    winMessage.classList.remove('show');
                    winMessage.textContent = '';
                }, 3000);
            }

            function updateHUD() {
                roundDisplay.textContent = `${Math.min(round, TOTAL_ROUNDS)} / ${TOTAL_ROUNDS}`;
                scoreDisplay.textContent = totalScore;
                recordDisplay.textContent = recordScore;
            }

            function updateTracker() {
                roundTracker.innerHTML = '';
                for (let i = 0; i < TOTAL_ROUNDS; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'tracker-dot';
                    if (i < roundResults.length) {
                        dot.classList.add(roundResults[i] ? 'active' : 'neutral');
                    }
                    if (i === round - 1 && !gameOver) dot.classList.add('current');
                    roundTracker.appendChild(dot);
                }
            }

            function initGame() {
                initGrid();
                renderGrid();
                updateHUD();
                updateTracker();
            }

            // ═══════════════════ LEADERBOARD ═══════════════════
            function addScore(name, score) {
                fetch(ALLORIGINS + encodeURIComponent(
                        `http://dreamlo.com/lb/${DREAMLO_KEY}/add/${encodeURIComponent(name)}/${score}`))
                    .then(() => loadLeaderboard())
                    .catch(console.error);
            }

            function loadLeaderboard() {
                fetch(ALLORIGINS + encodeURIComponent(`http://dreamlo.com/lb/${DREAMLO_KEY}/json`))
                    .then(r => r.json())
                    .then(data => {
                        let entries = [];
                        try {
                            const json = JSON.parse(data.contents);
                            if (json.dreamlo?.leaderboard?.entry) {
                                let raw = json.dreamlo.leaderboard.entry;
                                entries = (Array.isArray(raw) ? raw : [raw]).sort((a, b) => +b
                                    .score - +a.score).slice(0, 20);
                            }
                        } catch (e) {}
                        lbList.innerHTML = '';
                        if (!entries.length) {
                            lbList.innerHTML =
                                '<li class="lb-empty">No scores yet. Be the first!</li>';
                            return;
                        }
                        entries.forEach((e, i) => {
                            const li = document.createElement('li');
                            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' :
                                '🔹';
                            li.innerHTML =
                                `<span class="medal">${medal}</span><span class="name">${escapeHtml(e.name)}</span><span class="score">${e.score}</span>`;
                            lbList.appendChild(li);
                        });
                    })
                    .catch(() => lbList.innerHTML =
                        '<li class="lb-empty">Could not load scores.</li>');
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ═══════════════════ UI EVENTS ═══════════════════
            document.getElementById('recordsBtn').addEventListener('click', () => {
                lbOverlay.classList.toggle('open');
                if (lbOverlay.classList.contains('open')) loadLeaderboard();
            });
            document.getElementById('lbCloseBtn').addEventListener('click', () => lbOverlay.classList.remove(
                'open'));
            lbOverlay.addEventListener('click', e => {
                if (e.target === lbOverlay) lbOverlay.classList.remove('open');
            });

            let walletConnected = false;
            walletBtn.addEventListener('click', () => {
                walletConnected = !walletConnected;
                walletBtn.textContent = walletConnected ? '👛 5W...pQz' : '🔗 CONNECT';
                walletBtn.classList.toggle('connected', walletConnected);
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'r' || e.key === 'R') document.getElementById('recordsBtn').click();
                if (e.key === 'Escape') lbOverlay.classList.remove('open');
            });

            loadLeaderboard();
        })();
    </script>
</body>
</html>
